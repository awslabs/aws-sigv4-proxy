name: Build
permissions:
  contents: read

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ~1.26.0

      - name: Build
        run: |
          go build -v ./cmd/aws-sigv4-proxy

      - name: Run tests
        run: go test -v ./...
